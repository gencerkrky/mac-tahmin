<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maç Tahmin Paneli</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
  :root { --bg:#0f172a; --card:#1e293b; --line:#334155; --text:#e2e8f0;
          --muted:#94a3b8; --accent:#fbbf24; --good:#34d399; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:-apple-system,system-ui,sans-serif; background:var(--bg);
         color:var(--text); padding:1rem; max-width:960px; margin:0 auto; }
  h1 { font-size:1.3rem; margin-bottom:.75rem; }
  .bar { display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; margin-bottom:1rem; }
  select,button { background:var(--card); color:var(--text); border:1px solid var(--line);
                  border-radius:8px; padding:.5rem .75rem; font-size:.95rem; }
  button.primary { background:var(--accent); color:#111; font-weight:600; cursor:pointer; }
  .note { color:var(--muted); font-size:.8rem; margin:.5rem 0 1rem; }
  .match { background:var(--card); border:1px solid var(--line); border-radius:10px;
           padding:.7rem .9rem; margin-bottom:.5rem; cursor:pointer; }
  .match:hover { border-color:var(--accent); }
  .match .meta { color:var(--muted); font-size:.78rem; }
  .match .teams { font-weight:600; margin-top:.15rem; }
  .pred { margin-top:.6rem; border-top:1px dashed var(--line); padding-top:.6rem;
          display:grid; gap:.25rem; font-size:.9rem; }
  .pred .row { display:flex; justify-content:space-between; }
  .pred .star { color:var(--accent); font-weight:700; }
  .odds { color:var(--good); }
  .odds.hot { color:#fb7185; font-weight:700; } /* fair odds >= 2.00: value flag */
  #coupon { background:var(--card); border:1px solid var(--accent); border-radius:10px;
            padding:1rem; margin-bottom:1rem; display:none; }
  #coupon h2 { font-size:1.05rem; color:var(--accent); margin-bottom:.5rem; }
  #coupon .totals { margin-top:.6rem; font-weight:600; }
  .err { color:#f87171; margin:.5rem 0; }
  .spin { color:var(--muted); }
  .aiBtn { margin-top:.5rem; cursor:pointer; align-self:start; }
  .aiBtn:disabled { opacity:.5; cursor:default; }
  .ai { background:rgba(251,191,36,.08); border-left:3px solid var(--accent);
        padding:.5rem .7rem; border-radius:6px; font-size:.88rem; line-height:1.45; }
  .scoreList { margin-top:.4rem; font-size:.85rem; }
  .scoreList summary { cursor:pointer; color:var(--accent); }
  .scoreGrid { display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.4rem; }
  .scoreChip { background:#0f172a; border:1px solid var(--line); border-radius:6px;
               padding:.2rem .45rem; font-size:.82rem; }
</style>
</head>
<body>
<h1>⚽ Maç Tahmin Paneli</h1>

<div class="bar">
  <label>Spor: <select id="sportSel">
    <option value="football" selected>⚽ Futbol</option>
    <option value="basketball">🏀 Basketbol</option>
  </select></label>
  <label>Tarih: <select id="dateSel"></select></label>
  <label>Kupon: <select id="sizeSel">
    <option>3</option><option selected>5</option><option>7</option>
  </select> maç</label>
  <label>Mod: <select id="modeSel">
    <option value="safe" selected>🛡 Garanti</option>
    <option value="balanced">⚖️ Dengeli (1.50+)</option>
    <option value="value">🔥 Cesur (2.00+)</option>
  </select></label>
  <button class="primary" id="couponBtn">🎫 En Emin Kuponu Oluştur</button>
  <button id="historyBtn">📜 Geçmiş & İsabet</button>
</div>
<div id="history" style="display:none"></div>
<p class="note">Olasılıklar Poisson modelinin tahminidir; kesinlik garanti etmez.
Oranlar modelin <em>adil oranlarıdır</em>, bahis şirketi oranı değildir.</p>

<div id="msg"></div>
<div id="coupon"></div>
<div id="list"></div>

<script>
const list = document.getElementById("list");
const msg = document.getElementById("msg");
const couponBox = document.getElementById("coupon");
const dateSel = document.getElementById("dateSel");
const sportSel = document.getElementById("sportSel");
const isBasketball = () => sportSel.value === "basketball";
const fixturesUrl = () => isBasketball()
  ? `/api/basketball/fixtures?date=${dateSel.value}`
  : `/api/fixtures?date=${dateSel.value}`;

// Next 4 days as selectable dates (today first).
for (let i = 0; i < 4; i++) {
  const d = new Date(); d.setDate(d.getDate() + i);
  const iso = d.toISOString().slice(0, 10);
  const opt = new Option(i === 0 ? `Bugün (${iso})` : iso, iso);
  dateSel.add(opt);
}

const pct = p => (p * 100).toFixed(0) + "%";

async function getJSON(url) {
  const r = await fetch(url);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}

// "Ev sahibi kazanır" / "Deplasman kazanır" yerine takım adını kullan.
function winLabel(selection, f, side) {
  const name = side === "home" ? f.home.name : f.away.name;
  return `${name} kazanır`;
}

// Kupon/geçmiş için: maç sonucu tahmini ise takım adını, değilse orijinali göster.
function pickLabel(bp, f) {
  if (bp.market === "match_result" && (bp.selection === "home" || bp.selection === "away")) {
    return `${bp.selection === "home" ? f.home.name : f.away.name} kazanır`;
  }
  return bp.label;
}

function basketballRows(p, f) {
  const mr = p.match_result, tl = p.total_line;
  const rows = [
    [winLabel("home", f, "home"), mr.home, "home"],
    [winLabel("away", f, "away"), mr.away, "away"],
    [`${p.line} Üst`, tl.over], [`${p.line} Alt`, tl.under],
  ].map(([label, prob, side]) => {
    // best_pick etiketi orijinal ("Ev sahibi kazanır") olduğundan side ile eşle.
    const bp = p.best_pick;
    const isBest = (side && bp.selection === side) ||
                   (!side && bp.label === label);
    return `<div class="row ${isBest?"star":""}"><span>${isBest?"⭐ ":""}${label}</span>
      <span>${pct(prob)} <span class="odds">@${(1/prob).toFixed(2)}</span></span></div>`;
  }).join("");
  return rows +
    `<div class="row"><span>Beklenen skor</span><span>${p.expected_points.home} - ${p.expected_points.away}</span></div>
     <div class="row"><span>Fark (handikap)</span><span>${p.spread > 0 ? f.home.name : f.away.name} +${Math.abs(p.spread)}</span></div>`;
}

function predRows(p, best, f) {
  const rows = [
    ["match_result", "home", winLabel("home", f, "home"), p.match_result.home],
    ["match_result", "draw", "Beraberlik", p.match_result.draw],
    ["match_result", "away", winLabel("away", f, "away"), p.match_result.away],
    ["over_under_25", "over", "2.5 Üst", p.over_under_25.over],
    ["over_under_25", "under", "2.5 Alt", p.over_under_25.under],
    ["btts", "yes", "KG Var", p.btts.yes],
    ["btts", "no", "KG Yok", p.btts.no],
  ];
  const html = rows.map(([m, s, label, prob]) => {
    const isBest = best.market === m && best.selection === s;
    const cls = isBest ? "star" : "";
    const star = isBest ? "⭐ " : "";
    const odds = 1 / prob;
    const oddsCls = odds >= 2 ? "odds hot" : "odds";  // 2.00+ = value pick
    return `<div class="row ${cls}"><span>${star}${label}</span>
            <span>${pct(prob)} <span class="${oddsCls}">@${odds.toFixed(2)}</span></span></div>`;
  }).join("");
  // Ek marketler: 1.5/3.5 üst, çifte şans, tek/çift
  const extra = `
    <div class="row"><span>1.5 Üst / Alt</span><span>${pct(p.over_under["1.5"].over)} / ${pct(p.over_under["1.5"].under)}</span></div>
    <div class="row"><span>3.5 Üst / Alt</span><span>${pct(p.over_under["3.5"].over)} / ${pct(p.over_under["3.5"].under)}</span></div>
    <div class="row"><span>Çifte Şans (1X/12/X2)</span><span>${pct(p.double_chance["1X"])} / ${pct(p.double_chance["12"])} / ${pct(p.double_chance["X2"])}</span></div>
    <div class="row"><span>Toplam Gol Tek / Çift</span><span>${pct(p.odd_even.odd)} / ${pct(p.odd_even.even)}</span></div>`;

  // İY/MS: en olası 3 kombinasyon
  const htftTop = Object.entries(p.htft).sort((a,b)=>b[1]-a[1]).slice(0,3)
    .map(([k,v]) => `${k} (${pct(v)})`).join(" · ");

  // Tüm skorlar (ilk 12), İddaa'daki gibi oranlarıyla
  const scores = p.scorelines.slice(0,12).map(s =>
    `<span class="scoreChip">${s.home}-${s.away} <span class="odds">@${(1/s.probability).toFixed(1)}</span></span>`).join("");

  const s = p.most_likely_score;
  return html + extra +
    `<div class="row"><span>En olası skor</span><span>${s.home}-${s.away} (${pct(s.probability)})</span></div>
     <div class="row"><span>İY/MS (en olası 3)</span><span>${htftTop}</span></div>
     <details class="scoreList"><summary>📋 Tüm skorlar (oranlarıyla)</summary>
       <div class="scoreGrid">${scores}</div></details>
    <button class="aiBtn">🤖 AI Analiz</button><div class="aiBox"></div>`;
}

async function loadAnalysis(box, f, btn) {
  btn.disabled = true;
  const target = box.querySelector(".aiBox");
  target.innerHTML = '<span class="spin">AI analiz ediyor…</span>';
  try {
    const d = await getJSON(`/api/analyze?fixture=${f.fixture_id}&date=${dateSel.value}`);
    target.innerHTML = `<p class="ai">${d.analysis}</p>`;
  } catch (e) {
    target.innerHTML = `<span class="err">${e.message}</span>`;
    btn.disabled = false;
  }
}

async function loadFixtures() {
  list.innerHTML = ""; msg.innerHTML = '<p class="spin">Maçlar yükleniyor…</p>';
  try {
    const data = await getJSON(fixturesUrl());
    msg.innerHTML = "";
    if (!data.fixtures.length) {
      msg.innerHTML = '<p class="note">Bu tarihte seçili liglerde maç yok.</p>'; return;
    }
    for (const f of data.fixtures) {
      const el = document.createElement("div");
      el.className = "match";
      const kickoff = new Date(f.kickoff).toLocaleTimeString("tr-TR",
        { hour: "2-digit", minute: "2-digit" });  // local time, not UTC
      el.innerHTML = `<div class="meta">${f.league} · ${kickoff} (${f.status})</div>
        <div class="teams">${f.home.name} — ${f.away.name}</div>
        <div class="pred" hidden></div>`;
      el.addEventListener("click", () => showPrediction(el, f), { once: false });
      list.appendChild(el);
    }
  } catch (e) { msg.innerHTML = `<p class="err">${e.message}</p>`; }
}

async function showPrediction(el, f) {
  const box = el.querySelector(".pred");
  if (!box.hidden) { box.hidden = true; return; }
  if (box.dataset.loaded) { box.hidden = false; return; }
  box.hidden = false; box.innerHTML = '<span class="spin">Analiz ediliyor…</span>';
  try {
    const url = isBasketball()
      ? `/api/basketball/predict?fixture=${f.fixture_id}&date=${dateSel.value}`
      : `/api/predict?fixture=${f.fixture_id}&date=${dateSel.value}`;
    const d = await getJSON(url);
    box.innerHTML = isBasketball() ? basketballRows(d.prediction, f)
                                   : predRows(d.prediction, d.best_pick, f);
    box.dataset.loaded = "1";
    const aiBtn = box.querySelector(".aiBtn");
    if (aiBtn) aiBtn.addEventListener("click", (ev) => {
      ev.stopPropagation();  // don't toggle the card closed
      loadAnalysis(box, f, aiBtn);
    });
  } catch (e) { box.innerHTML = `<span class="err">${e.message}</span>`; }
}

document.getElementById("couponBtn").addEventListener("click", async () => {
  couponBox.style.display = "block";
  couponBox.innerHTML = '<span class="spin">Maçlar analiz ediliyor (biraz sürebilir)…</span>';
  const size = document.getElementById("sizeSel").value;
  const mode = document.getElementById("modeSel").value;
  try {
    const c = await getJSON(`/api/coupon?date=${dateSel.value}&size=${size}&mode=${mode}`);
    if (!c.picks.length) {
      couponBox.innerHTML = '<p class="note">Bu tarihte analiz edilecek başlamamış maç yok.</p>'; return;
    }
    const rows = c.picks.map(p => {
      const f = p.fixture, b = p.best_pick;
      return `<div class="row"><span>${f.home.name} — ${f.away.name}</span>
        <span class="star">${pickLabel(b, f)} ${pct(b.probability)} <span class="odds">@${b.fair_odds}</span></span></div>`;
    }).join("");
    const skipped = c.skipped_count
      ? `<p class="note">Kota koruması: ${c.skipped_count} maç analiz dışı bırakıldı.</p>` : "";
    couponBox.innerHTML = `<h2>🎫 En Emin ${c.picks.length} Maç</h2><div class="pred">${rows}</div>
      <div class="totals">Toplam adil oran: <span class="odds">${c.total_odds}</span> ·
      Birleşik isabet: ${pct(c.combined_probability)}</div>${skipped}`;
  } catch (e) { couponBox.innerHTML = `<p class="err">${e.message}</p>`; }
});

const historyBox = document.getElementById("history");
const MODE_LABELS = { safe: "🛡 Garanti", balanced: "⚖️ Dengeli", value: "🔥 Cesur" };

document.getElementById("historyBtn").addEventListener("click", async () => {
  if (historyBox.style.display === "block") { historyBox.style.display = "none"; return; }
  historyBox.style.display = "block";
  historyBox.innerHTML = '<span class="spin">Geçmiş yükleniyor ve sonuçlar kontrol ediliyor…</span>';
  try {
    const h = await getJSON("/api/history");
    if (!h.coupons.length) {
      historyBox.innerHTML = '<p class="note">Henüz kayıtlı kupon yok. Bir kupon oluşturun!</p>'; return;
    }
    const s = h.stats;
    const summary = s.total_picks
      ? `<p class="totals">Genel isabet: ${s.total_hits}/${s.total_picks} tahmin
         (${(s.hit_rate*100).toFixed(0)}%) · ${s.settled_coupons} sonuçlanmış kupon</p>`
      : '<p class="note">Sonuçlanmış kupon yok — maçlar bitince otomatik değerlendirilir.</p>';
    const items = h.coupons.map(c => {
      const rows = c.picks.map(p => {
        const icon = p.hit === true ? "✅" : p.hit === false ? "❌" : "⏳";
        const score = p.final_score ? ` <span class="odds">(${p.final_score})</span>` : "";
        return `<div class="row"><span>${icon} ${p.fixture.home.name} — ${p.fixture.away.name}${score}</span>
          <span>${pickLabel(p.best_pick, p.fixture)} @${p.best_pick.fair_odds}</span></div>`;
      }).join("");
      const status = c.settled_at ? `${c.hit_count}/${c.picks.length} tuttu` : "beklemede";
      return `<div class="match"><div class="meta">${c.date} · ${MODE_LABELS[c.mode] || c.mode} ·
        oran ${c.total_odds} · ${status}</div><div class="pred">${rows}</div></div>`;
    }).join("");
    historyBox.innerHTML = summary + items;
  } catch (e) { historyBox.innerHTML = `<p class="err">${e.message}</p>`; }
});

// Kupon ve AI sadece futbolda anlamlı (basketbol modeli farklı).
function updateSportUI() {
  const football = !isBasketball();
  document.getElementById("couponBtn").style.display = football ? "" : "none";
  document.getElementById("sizeSel").parentElement.style.display = football ? "" : "none";
  document.getElementById("modeSel").parentElement.style.display = football ? "" : "none";
  couponBox.style.display = "none";
}
sportSel.addEventListener("change", () => { updateSportUI(); loadFixtures(); });

dateSel.addEventListener("change", loadFixtures);
updateSportUI();
loadFixtures();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Günün Kuponu — Maç Tahmin Paneli</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
  :root { --bg:#0f172a; --card:#1e293b; --line:#334155; --text:#e2e8f0;
          --muted:#94a3b8; --accent:#fbbf24; --good:#34d399; --bad:#f87171; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:-apple-system,system-ui,sans-serif; background:var(--bg);
         color:var(--text); padding:1rem; max-width:960px; margin:0 auto; }
  h1 { font-size:1.3rem; margin-bottom:.25rem; }
  h2 { font-size:1.05rem; color:var(--accent); margin:1.2rem 0 .5rem; }
  .note { color:var(--muted); font-size:.8rem; margin:.4rem 0 1rem; }
  .tabs { display:flex; gap:.5rem; margin:.8rem 0; flex-wrap:wrap; }
  .tabs button { background:var(--card); color:var(--text); border:1px solid var(--line);
                 border-radius:8px; padding:.45rem .8rem; cursor:pointer; font-size:.9rem; }
  .tabs button.active { background:var(--accent); color:#111; font-weight:600; }
  .match, .coupon { background:var(--card); border:1px solid var(--line); border-radius:10px;
           padding:.7rem .9rem; margin-bottom:.5rem; }
  .coupon { border-color:var(--accent); }
  .meta { color:var(--muted); font-size:.78rem; }
  .teams { font-weight:600; margin-top:.15rem; }
  .pred { margin-top:.5rem; border-top:1px dashed var(--line); padding-top:.5rem;
          display:grid; gap:.22rem; font-size:.88rem; }
  .row { display:flex; justify-content:space-between; gap:.6rem; }
  .star { color:var(--accent); font-weight:700; }
  .odds { color:var(--good); }
  .odds.hot { color:#fb7185; font-weight:700; }
  .totals { margin-top:.5rem; font-weight:600; }
  .err { color:#f87171; }
  .spin { color:var(--muted); }
  .scoreList { margin-top:.4rem; font-size:.85rem; }
  .scoreList summary { cursor:pointer; color:var(--accent); }
  /* "Öne çıkan" tek tahmin bloğu */
  .headline { margin-top:.5rem; border-top:1px dashed var(--line); padding-top:.5rem; }
  .headline .lbl { color:var(--accent); font-size:.72rem; font-weight:700;
                   text-transform:uppercase; letter-spacing:.05em; }
  .headline .pick { font-size:1.05rem; font-weight:800; margin-top:.1rem;
                    display:flex; flex-wrap:wrap; align-items:baseline; gap:.4rem; }
  .headline .pick .odds { font-size:.9rem; }
  .headline .score { color:var(--muted); font-size:.82rem; margin-top:.1rem; }
  /* Katlanabilir detaylı olasılıklar */
  .more { margin-top:.5rem; font-size:.88rem; }
  .more > summary { cursor:pointer; color:var(--accent); font-weight:600;
                    list-style:none; padding:.15rem 0; }
  .more > summary::before { content:"▸ "; }
  .more[open] > summary::before { content:"▾ "; }
  .more .body { display:grid; gap:.22rem; margin-top:.3rem; }
  .hint { color:var(--muted); font-size:.76rem; line-height:1.45;
          background:#0f172a; border:1px solid var(--line); border-radius:6px;
          padding:.4rem .55rem; margin:.1rem 0 .35rem; }
  .hint b { color:var(--text); }
  .scoreGrid { display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.4rem; }
  .scoreChip { background:#0f172a; border:1px solid var(--line); border-radius:6px;
               padding:.2rem .45rem; font-size:.82rem; }
  .sportTabs { display:flex; gap:.5rem; margin:.5rem 0; }
  .sportTabs button { background:var(--card); color:var(--text); border:1px solid var(--line);
                      border-radius:8px; padding:.45rem 1rem; cursor:pointer; }
  .sportTabs button.active { background:var(--accent); color:#111; font-weight:600; }
  /* Üst bölüm sekmeleri (yapışkan) */
  .mainTabs { position:sticky; top:0; z-index:10; background:var(--bg);
              display:flex; gap:.4rem; flex-wrap:wrap; padding:.6rem 0; margin-bottom:.5rem;
              border-bottom:1px solid var(--line); }
  .mainTabs button { background:var(--card); color:var(--text); border:1px solid var(--line);
                     border-radius:8px; padding:.5rem .9rem; cursor:pointer; font-size:.95rem; }
  .mainTabs button.active { background:var(--accent); color:#111; font-weight:700; }
  .section { display:none; }
  .section.active { display:block; }
  /* İstatistik özeti: büyük skor kartları */
  .statGrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
              gap:.6rem; margin:.6rem 0 1rem; }
  .statCard { background:var(--card); border:1px solid var(--line); border-radius:10px;
              padding:.8rem .9rem; }
  .statCard .lbl { color:var(--muted); font-size:.72rem; text-transform:uppercase;
                   letter-spacing:.04em; }
  .statCard .big { font-size:1.7rem; font-weight:800; margin-top:.15rem;
                   font-variant-numeric:tabular-nums; }
  .statCard .sub2 { color:var(--muted); font-size:.75rem; margin-top:.15rem; }
  .statCard.good .big { color:var(--good); }
  .statCard.bad .big { color:var(--bad); }
  /* Analiz: yatay çubuklar */
  .bar { display:grid; grid-template-columns:5.5rem 1fr 3rem; align-items:center;
         gap:.5rem; margin:.3rem 0; font-size:.82rem; }
  .bar .track { background:#0f172a; border:1px solid var(--line); border-radius:5px;
                height:.7rem; overflow:hidden; }
  .bar .fill { height:100%; background:var(--good); }
  .bar .fill.low { background:var(--bad); }
  .bar .fill.mid { background:var(--accent); }
  .bar .val { text-align:right; color:var(--muted); font-variant-numeric:tabular-nums; }
  .insight { background:var(--card); border:1px solid var(--line);
             border-left:3px solid var(--accent); border-radius:8px;
             padding:.7rem .9rem; margin:.6rem 0; font-size:.86rem; line-height:1.5; }
  .insight b { color:var(--text); }
</style>
</head>
<body>
<h1>⚽ Günün Kuponu</h1>
<p class="note" id="genInfo">Yükleniyor…</p>
<div id="content"><span class="spin">Veriler yükleniyor…</span></div>

<script>
const pct = p => (p * 100).toFixed(0) + "%";
const MODE_LABELS = { safe:"🛡 Garanti", balanced:"⚖️ Dengeli (1.50+)", value:"🔥 Cesur (2.00+)" };
const localTime = iso => new Date(iso).toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});

function couponHTML(c) {
  if (!c.picks.length) return "";
  const rows = c.picks.map(p => {
    const b = p.best_pick, f = p.fixture;
    const icon = p.hit === true ? "✅ " : p.hit === false ? "❌ " : "";
    const score = p.final_score ? ` <span class="odds">(${p.final_score})</span>` : "";
    return `<div class="row"><span>${icon}${f.home.name} — ${f.away.name}${score}</span>
      <span class="star">${pickLabel(b, f)} ${pct(b.probability)} <span class="odds">@${b.fair_odds}</span></span></div>`;
  }).join("");
  const status = c.settled ? ` · <b>${c.hit_count}/${c.picks.length} tuttu</b>` : "";
  return `<div class="coupon"><div class="meta">${c.date} · ${MODE_LABELS[c.mode]||c.mode}${status}</div>
    <div class="pred">${rows}</div>
    <div class="totals">Toplam adil oran: <span class="odds">${c.total_odds}</span> ·
    Birleşik isabet: ${pct(c.combined_probability)}</div></div>`;
}

const MODE_LABELS_FULL = { safe:"🛡 Garanti", balanced:"⚖️ Dengeli", value:"🔥 Cesur" };

// Bir isabet oranına göre çubuk rengi: kırmızı (kötü) → sarı → yeşil (iyi).
function rateClass(rate) { return rate >= 0.6 ? "" : rate >= 0.5 ? "mid" : "low"; }

// Yatay isabet çubuğu: etiket · dolu çubuk · "x/y" değeri.
function barHTML(label, hits, total) {
  if (!total) return "";
  const rate = hits / total;
  return `<div class="bar"><span>${label}</span>
    <span class="track"><span class="fill ${rateClass(rate)}" style="width:${(rate*100).toFixed(0)}%"></span></span>
    <span class="val">${hits}/${total}</span></div>`;
}

// Verilerden otomatik, dürüst bir yorum üretir (örnek sayısına göre uyarır).
function buildInsight(ov, byMode, cal) {
  const n = ov.pick_total;
  if (n < 15) {
    return `<div class="insight">⚠️ <b>Örnek çok küçük (${n} tahmin).</b>
      Bu oranlar henüz güvenilir değil — istatistiksel olarak anlamlı sonuç için
      en az 30-50 sonuçlanmış tahmin gerekir. Sistem her gün otomatik veri
      biriktiriyor; birkaç gün sonra bu bölüm anlam kazanacak.</div>`;
  }
  // En iyi çalışan güven aralığını bul (yeterli örneği olanlar arasında).
  let best = null;
  for (const [band, b] of Object.entries(cal)) {
    if (b.total >= 3 && (!best || b.hits/b.total > best.rate))
      best = { band, rate: b.hits/b.total, total: b.total };
  }
  const bestModeEntry = Object.entries(byMode)
    .filter(([, b]) => b.pick_total >= 3)
    .sort((a, b) => (b[1].pick_rate||0) - (a[1].pick_rate||0))[0];
  let msg = `<div class="insight">📊 <b>${n} tahminin ${ov.pick_hits}'i tuttu (%${(ov.pick_rate*100).toFixed(0)}).</b> `;
  if (best)
    msg += `Model en çok <b>${best.band}</b> güven aralığında isabetli
      (%${(best.rate*100).toFixed(0)}). `;
  if (bestModeEntry)
    msg += `Modlar içinde <b>${MODE_LABELS_FULL[bestModeEntry[0]]||bestModeEntry[0]}</b>
      en iyisi. `;
  msg += `Yüksek oranı (Cesur mod) zorlayan tahminler doğası gereği daha az tutar —
    yüksek kazanç, düşük olasılık demektir.</div>`;
  return msg;
}

function buildStatsHTML(s) {
  const ov = s.overall || {};
  if (!ov.pick_total)
    return '<p class="note">Henüz sonuçlanmış kupon yok — maçlar bitince otomatik değerlendirilir.</p>';

  // 1) Büyük özet kartları.
  const pr = ov.pick_rate || 0;
  const summaryCards = `<div class="statGrid">
    <div class="statCard ${pr>=0.5?"good":"bad"}">
      <div class="lbl">Tahmin isabeti</div>
      <div class="big">%${(pr*100).toFixed(0)}</div>
      <div class="sub2">${ov.pick_hits}/${ov.pick_total} tahmin</div></div>
    <div class="statCard">
      <div class="lbl">Tam tutan kupon</div>
      <div class="big">${ov.coupon_wins}/${ov.coupon_total}</div>
      <div class="sub2">kupondaki maçların hepsi tutmalı</div></div>
    <div class="statCard">
      <div class="lbl">Değerlendirilen</div>
      <div class="big">${ov.pick_total}</div>
      <div class="sub2">sonuçlanmış tahmin</div></div>
  </div>`;

  // 2) Otomatik yorum.
  const insight = buildInsight(ov, s.by_mode || {}, s.calibration || {});

  // 3) Kalibrasyon: modelin dediği güven → gerçekte ne tuttu.
  const cal = s.calibration || {};
  const calBars = ["50-60%","60-70%","70-80%","80%+"]
    .map(band => barHTML(band, (cal[band]||{}).hits||0, (cal[band]||{}).total||0))
    .join("") || '<p class="note">Yeterli veri yok.</p>';

  // 4) Pazar bazlı: hangi tahmin türü daha çok tutuyor.
  const bm = s.by_market || {};
  const marketBars = Object.entries(bm)
    .sort((a,b) => b[1].total - a[1].total)
    .map(([label, b]) => barHTML(label, b.hits, b.total))
    .join("") || '<p class="note">Yeterli veri yok.</p>';

  // 5) Mod karşılaştırması.
  const line = (b) => {
    const r = b.pick_rate != null ? `${(b.pick_rate*100).toFixed(0)}%` : "—";
    const cr = b.coupon_rate != null ? `${(b.coupon_rate*100).toFixed(0)}%` : "—";
    return `<div class="row"><span>Tahmin isabeti</span>
              <span class="star">${b.pick_hits}/${b.pick_total} (${r})</span></div>
            <div class="row"><span>Tam tutan kupon</span>
              <span>${b.coupon_wins}/${b.coupon_total} (${cr})</span></div>`;
  };
  let modeHTML = "";
  for (const [mode, b] of Object.entries(s.by_mode || {}))
    modeHTML += `<div class="coupon"><div class="meta">${MODE_LABELS_FULL[mode]||mode}</div>
             <div class="pred">${line(b)}</div></div>`;

  return summaryCards + insight +
    `<h2>🎯 Kalibrasyon — modelin güveni ne kadar doğru?</h2>
     <p class="note">Model "%X eminim" dediğinde gerçekte ne kadar tuttu. İdeal olan yüksek aralıkların dolu olması.</p>
     ${calBars}
     <h2>📌 Tahmin türüne göre isabet</h2>
     <p class="note">Hangi bahis türü daha güvenilir çıktı.</p>
     ${marketBars}
     <h2>⚙️ Moda göre</h2>
     ${modeHTML}`;
}

// "Ev sahibi/Deplasman kazanır" yerine takım adı.
function pickLabel(bp, f) {
  if (bp.market === "match_result" && (bp.selection === "home" || bp.selection === "away")) {
    return `${bp.selection === "home" ? f.home.name : f.away.name} kazanır`;
  }
  return bp.label;
}

// Öne çıkan tek tahmin: en güvenli bahis (best_pick) + en olası skor.
function headlineHTML(p, best, f) {
  if (!best) return "";
  const odds = best.fair_odds != null ? best.fair_odds : (1 / best.probability).toFixed(2);
  const sc = p.most_likely_score;
  const score = sc ? `<div class="score">Tahmini skor: <b>${sc.home}-${sc.away}</b> (${pct(sc.probability)})</div>` : "";
  return `<div class="headline"><div class="lbl">⭐ Öne çıkan</div>
    <div class="pick">${pickLabel(best, f)} · ${pct(best.probability)}
      <span class="odds ${odds>=2?"hot":""}">@${odds}</span></div>${score}</div>`;
}

function predHTML(p, best, f) {
  // Temel satırlar (varsayılan açık): maç sonucu, 2.5 alt/üst, KG.
  const rows = [
    ["match_result","home",`${f.home.name} kazanır`,p.match_result.home],
    ["match_result","draw","Beraberlik",p.match_result.draw],
    ["match_result","away",`${f.away.name} kazanır`,p.match_result.away],
    ["over_under_25","over","2.5 Üst",p.over_under_25.over],
    ["over_under_25","under","2.5 Alt",p.over_under_25.under],
    ["btts","yes","KG Var",p.btts.yes],
    ["btts","no","KG Yok",p.btts.no],
  ].map(([m,s,label,prob]) => {
    const isBest = best && best.market===m && best.selection===s;
    const odds = 1/prob;
    return `<div class="row ${isBest?"star":""}"><span>${isBest?"⭐ ":""}${label}</span>
      <span>${pct(prob)} <span class="odds ${odds>=2?"hot":""}">@${odds.toFixed(2)}</span></span></div>`;
  }).join("");
  const sc = p.most_likely_score;
  const scoreRow = `<div class="row"><span>En olası skor</span><span>${sc.home}-${sc.away} (${pct(sc.probability)})</span></div>`;

  // Genişletilmiş marketler yoksa: sadece temel satırlar + en olası skor.
  if (!p.over_under) return headlineHTML(p, best, f) + rows + scoreRow;

  // Gelişmiş satırlar: az anlaşılan marketler açıklamalarıyla katlı bölümde.
  const htftTop = Object.entries(p.htft).sort((a,b)=>b[1]-a[1]).slice(0,3)
    .map(([k,v]) => `${k} (${pct(v)})`).join(" · ");
  const scores = p.scorelines.slice(0,12).map(s =>
    `<span class="scoreChip">${s.home}-${s.away} <span class="odds">@${(1/s.probability).toFixed(1)}</span></span>`).join("");
  const advanced = `
    <div class="hint">
      <b>Çifte Şans (1X/12/X2):</b> iki sonuçtan biri tutsa yeter —
      1X: ev kazanır <i>veya</i> berabere, 12: berabere olmaz,
      X2: deplasman kazanır <i>veya</i> berabere.<br>
      <b>İY/MS:</b> ilk yarı / maç sonu yönü (2/2 = ev önde başlar, ev kazanır).<br>
      <b>Toplam Gol Tek/Çift:</b> maçtaki toplam gol sayısı tek mi çift mi.
    </div>
    <div class="row"><span>1.5 Üst / Alt</span><span>${pct(p.over_under["1.5"].over)} / ${pct(p.over_under["1.5"].under)}</span></div>
    <div class="row"><span>3.5 Üst / Alt</span><span>${pct(p.over_under["3.5"].over)} / ${pct(p.over_under["3.5"].under)}</span></div>
    <div class="row"><span>Çifte Şans (1X/12/X2)</span><span>${pct(p.double_chance["1X"])} / ${pct(p.double_chance["12"])} / ${pct(p.double_chance["X2"])}</span></div>
    <div class="row"><span>Toplam Gol Tek / Çift</span><span>${pct(p.odd_even.odd)} / ${pct(p.odd_even.even)}</span></div>
    <div class="row"><span>İY/MS (en olası 3)</span><span>${htftTop}</span></div>
    <details class="scoreList"><summary>📋 Tüm skorlar (oranlarıyla)</summary><div class="scoreGrid">${scores}</div></details>`;

  return headlineHTML(p, best, f) + rows + scoreRow +
    `<details class="more"><summary>Detaylı olasılıklar</summary><div class="body">${advanced}</div></details>`;
}

function basketballPredHTML(p, f) {
  const mr = p.match_result, tl = p.total_line, bp = p.best_pick;
  // Öne çıkan tek tahmin: en güvenli bahis + beklenen skor.
  // Galibiyet bahsinde ham "Ev/Deplasman" yerine takım adını göster.
  const bpLabel = bp && bp.selection === "home" ? `${f.home.name} kazanır`
    : bp && bp.selection === "away" ? `${f.away.name} kazanır`
    : bp ? bp.label : "";
  const headline = bp
    ? `<div class="headline"><div class="lbl">⭐ Öne çıkan</div>
        <div class="pick">${bpLabel} · ${pct(bp.probability)}
          <span class="odds">@${(1/bp.probability).toFixed(2)}</span></div>
        <div class="score">Beklenen skor: <b>${p.expected_points.home} - ${p.expected_points.away}</b></div></div>`
    : "";
  const rows = [
    [`${f.home.name} kazanır`, mr.home, "home"],
    [`${f.away.name} kazanır`, mr.away, "away"],
    [`${p.line} Üst`, tl.over], [`${p.line} Alt`, tl.under],
  ].map(([label, prob, side]) => {
    const isBest = side ? bp.selection === side : bp.label === label;
    return `<div class="row ${isBest?"star":""}"><span>${isBest?"⭐ ":""}${label}</span>
      <span>${pct(prob)} <span class="odds">@${(1/prob).toFixed(2)}</span></span></div>`;
  }).join("");
  return headline + rows +
    `<div class="row"><span>Beklenen skor</span><span>${p.expected_points.home} - ${p.expected_points.away}</span></div>
     <div class="row"><span>Fark (handikap)</span><span>${p.spread > 0 ? f.home.name : f.away.name} +${Math.abs(p.spread)}</span></div>`;
}

function basketballDayHTML(day) {
  if (!day.matches.length) return '<p class="note">Bu tarihte basketbol maçı yok (sezon arası olabilir).</p>';
  return day.matches.map(m => {
    const f = m.fixture;
    const pred = m.prediction ? `<div class="pred">${basketballPredHTML(m.prediction, f)}</div>` : "";
    return `<div class="match"><div class="meta">🏀 ${f.league} · ${localTime(f.kickoff)} (${f.status})</div>
      <div class="teams">${f.home.name} — ${f.away.name}</div>${pred}</div>`;
  }).join("");
}

function dayHTML(day) {
  if (!day.matches.length) return '<p class="note">Bu tarihte seçili liglerde maç yok.</p>';
  return day.matches.map(m => {
    const f = m.fixture;
    const pred = m.prediction ? `<div class="pred">${predHTML(m.prediction, m.best_pick, f)}</div>` : "";
    const score = (f.goals && f.goals.home != null && f.status !== "NS")
      ? ` <span class="odds">${f.goals.home}-${f.goals.away}</span>` : "";
    return `<div class="match"><div class="meta">${f.league} · ${localTime(f.kickoff)} (${f.status})</div>
      <div class="teams">${f.home.name} — ${f.away.name}${score}</div>${pred}</div>`;
  }).join("");
}

async function main() {
  let d;
  try {
    d = await (await fetch("data.json?t=" + Date.now())).json();
  } catch (e) {
    document.getElementById("content").innerHTML = '<p class="err">Veri yüklenemedi.</p>';
    return;
  }
  const gen = new Date(d.generated_at).toLocaleString("tr-TR");
  const s = d.stats;
  const ov = (s.overall) || {};
  const acc = ov.pick_total
    ? ` · Son ${s.window_days||30} gün isabet: ${(ov.pick_rate*100).toFixed(0)}%`
    : "";
  document.getElementById("genInfo").textContent =
    `Son güncelleme: ${gen} · Her sabah otomatik yenilenir${acc} · İstatistiksel tahmindir, kesinlik garanti etmez.`;

  const coupons = d.coupons.map(couponHTML).join("") || '<p class="note">Bugün kupon oluşturulamadı.</p>';
  const historyItems = d.history.map(couponHTML).join("") || '<p class="note">Henüz geçmiş yok.</p>';
  const statsHTML = buildStatsHTML(s);

  const tabs = d.days.map((day,i) =>
    `<button data-i="${i}" class="${i===0?"active":""}">${i===0?"Bugün":"Yarın"} (${day.date})</button>`).join("");
  const bball = d.basketball || [];
  const bballTabs = bball.map((day,i) =>
    `<button data-bi="${i}" class="${i===0?"active":""}">${i===0?"Bugün":"Yarın"} (${day.date})</button>`).join("");

  document.getElementById("content").innerHTML =
    `<div class="mainTabs">
       <button data-sec="coupons" class="active">🎫 Kuponlar</button>
       <button data-sec="football">⚽ Futbol</button>
       <button data-sec="basketball">🏀 Basketbol</button>
       <button data-sec="history">📜 Geçmiş</button>
     </div>
     <div class="section active" id="sec-coupons"><h2>🎫 Günün Kuponları (Futbol)</h2>${coupons}</div>
     <div class="section" id="sec-football"><h2>⚽ Futbol Bülteni</h2><div class="tabs">${tabs}</div><div id="day"></div></div>
     <div class="section" id="sec-basketball"><h2>🏀 Basketbol Bülteni</h2><div class="tabs" id="bballTabs">${bballTabs}</div><div id="bballDay"></div></div>
     <div class="section" id="sec-history"><h2>📈 Son ${s.window_days||30} Gün — İsabet & Analiz</h2>${statsHTML}
       <h2>📜 Kupon Geçmişi</h2>
       <p class="note">✅ tutan · ❌ tutmayan tahminler, gerçek skorlarıyla.</p>${historyItems}</div>`;

  // Üst sekme geçişi: sadece seçilen bölümü göster.
  document.querySelectorAll(".mainTabs button").forEach(btn =>
    btn.addEventListener("click", () => {
      document.querySelectorAll(".mainTabs button").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("sec-" + btn.dataset.sec).classList.add("active");
      window.scrollTo(0, 0);
    }));

  const dayBox = document.getElementById("day");
  document.querySelectorAll(".tabs:not(#bballTabs) button").forEach(btn =>
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tabs:not(#bballTabs) button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      dayBox.innerHTML = dayHTML(d.days[+btn.dataset.i]);
    }));
  dayBox.innerHTML = dayHTML(d.days[0]);

  const bballBox = document.getElementById("bballDay");
  if (bball.length) {
    document.querySelectorAll("#bballTabs button").forEach(btn =>
      btn.addEventListener("click", () => {
        document.querySelectorAll("#bballTabs button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        bballBox.innerHTML = basketballDayHTML(bball[+btn.dataset.bi]);
      }));
    bballBox.innerHTML = basketballDayHTML(bball[0]);
  } else {
    bballBox.innerHTML = '<p class="note">Basketbol verisi yok.</p>';
  }
}
main();
</script>
</body>
</html>
